# ===================== 存储配置 =====================
storage:
  driver: "sqlite"
  # SQLite 数据库文件路径，按需修改
  dsn: "/data/lumin/acpool.db"

# ===================== 日志配置 =====================
log:
  # 日志级别: debug | info | warn | error
  level: "info"
  # 日志输出目录，为空则输出到 stdout
  dir: "./logs"

# ===================== 负载均衡器配置 =====================
balancer:
  # 默认最大重试次数（0 表示不重试）
  default_max_retries: 3
  # 是否默认启用故障转移
  default_enable_failover: true

  # ---------- 账号级选择策略 ----------
  # 可选策略: round_robin | priority | weighted | least_used | affinity
  # 以下示例使用 round_robin（轮询），无需额外参数
  selector:
    round_robin: {}

  # 如果需要 affinity（亲和）策略，可替换为：
  # selector:
  #   affinity:
  #     fallback: round_robin

  # ---------- 供应商级选择策略 ----------
  # 可选策略: group_priority | group_round_robin | group_weighted | group_most_available | group_affinity
  group_selector:
    group_priority: {}

  # 如果需要 group_affinity 策略，可替换为：
  # group_selector:
  #   group_affinity:
  #     fallback: group_priority

  # ---------- 并发占用控制策略 ----------
  # 可选策略: unlimited | fixed | adaptive
  # 以下示例使用 fixed（固定上限）
  occupancy:
    fixed:
      default_limit: 10

  # 如果需要 adaptive（自适应）策略，可替换为（需同时配置 usage_tracker）：
  # occupancy:
  #   adaptive:
  #     factor: 0.8
  #     min_limit: 1
  #     max_limit: 100
  #     fallback_limit: 1

  # 如果不需要并发控制，可替换为：
  # occupancy:
  #   unlimited: {}

  # ---------- 熔断器配置 ----------
  circuit_breaker:
    # 连续失败阈值
    default_threshold: 5
    # 熔断恢复时间
    default_timeout: 60s
    # 动态阈值比例
    threshold_ratio: 0.5
    # 最小阈值
    min_threshold: 3

  # ---------- 冷却管理器配置 ----------
  cooldown:
    # 默认冷却时长
    default_duration: 30s

  # ---------- 用量追踪器配置 ----------
  usage_tracker:
    # 安全阈值比例
    safety_ratio: 0.95
